version: 2

project_name: chief-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: chief
    main: ./cmd/chief
    binary: chief
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: chief
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: chief
    binaries:
      - chief
    repository:
      owner: Storytell-ai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/Storytell-ai/chief-cli"
    description: "Chief command-line interface"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/chief"]
          end

changelog:
  sort: asc
  use: github
  format: "{{ .Message }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: New Features
      regexp: "^.*feat[:(].*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[:(].*$"
      order: 1
    - title: Others
      order: 999
